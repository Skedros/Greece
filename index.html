  <!-- Aggressive cleanup: remove any stale service worker from the old PWA version
       and force a one-time reload so fresh content is fetched. Runs BEFORE the rest
       of the page so cached scripts don't get a chance to run with old data. -->
  <script>
  (function () {
    if (sessionStorage.getItem('greece_sw_cleaned') === '1') return;
    if (!('serviceWorker' in navigator)) return;
    navigator.serviceWorker.getRegistrations().then(function (regs) {
      var hadSW = regs.length > 0;
      Promise.all(regs.map(function (r) { return r.unregister(); })).then(function () {
        var clearCaches = ('caches' in window)
          ? caches.keys().then(function (ns) { return Promise.all(ns.map(function (n) { return caches.delete(n); })); })
          : Promise.resolve();
        clearCaches.then(function () {
          if (hadSW) {
            sessionStorage.setItem('greece_sw_cleaned', '1');
            window.location.reload();
          }
        });
      });
    });
  })();
  </script>
